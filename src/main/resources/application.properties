spring.application.name=Car-Dealership-Inventory-System
server.port=8080
spring.devtools.restart.enabled=false

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/cardealership2
spring.datasource.username=hetgajera
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=YourSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm123456
jwt.expiration=86400000

# Jackson Configuration
spring.jackson.mapper.accept-case-insensitive-enums=true